{% extends 'setup/_layout_setup.html' %}

{% block setup_content %}
  <h1 class="cl-setup__title">Administrador</h1>
  <p class="cl-setup__subtitle">Crea tu cuenta de administrador para gestionar el sistema.</p>

  <form method="POST" action="{{ url_for('setup.paso2') }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="cl-form-group">
      <label class="cl-form-label" for="nombre">Tu nombre</label>
      <input type="text" class="cl-form-input" name="nombre" id="nombre"
             value="{{ nombre }}" placeholder="Juan Pérez" maxlength="100" required autofocus>
    </div>

    <div class="cl-form-group">
      <label class="cl-form-label" for="email">Email</label>
      <input type="email" class="cl-form-input" name="email" id="email"
             value="{{ email }}" placeholder="tu@correo.com" required>
    </div>

    <div class="cl-form-group">
      <label class="cl-form-label" for="password">Contraseña</label>
      <input type="password" class="cl-form-input" name="password" id="password"
             placeholder="Mínimo 8 caracteres" required>
      <small class="form-text text-muted" style="font-size:var(--cl-text-xs);color:var(--cl-text-secondary)">
        Mayúscula, minúscula, número. Mínimo 8 caracteres.
      </small>
    </div>

    <div class="cl-form-group">
      <label class="cl-form-label" for="password2">Confirmar contraseña</label>
      <input type="password" class="cl-form-input" name="password2" id="password2"
             placeholder="Repite la contraseña" required>
    </div>

    <div class="cl-setup__actions">
      <a href="{{ url_for('setup.paso1') }}" class="cl-btn cl-btn--outline"><i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Atrás</a>
      <button type="submit" class="cl-btn cl-btn--primary">Siguiente <i data-lucide="arrow-right" style="width:16px;height:16px;"></i></button>
    </div>
  </form>
{% endblock %}
