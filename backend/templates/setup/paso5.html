{% extends 'setup/_layout_setup.html' %}

{% block setup_content %}
  <h1 class="cl-setup__title">Tu Equipo</h1>
  <p class="cl-setup__subtitle">Agrega a las personas que usarán el sistema. Puedes omitir este paso.</p>

  <form method="POST" action="{{ url_for('setup.paso5') }}" id="teamForm" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div id="userRows">
      <div class="cl-setup__row" style="flex-wrap:wrap">
        <div class="cl-form-group" style="flex:2;min-width:140px">
          <label class="cl-form-label">Nombre</label>
          <input type="text" class="cl-form-input" name="user_nombre[]" placeholder="María">
        </div>
        <div class="cl-form-group" style="flex:2;min-width:140px">
          <label class="cl-form-label">Email</label>
          <input type="email" class="cl-form-input" name="user_email[]" placeholder="maria@correo.com">
        </div>
        <div class="cl-form-group" style="flex:1;min-width:120px">
          <label class="cl-form-label">Contraseña</label>
          <input type="password" class="cl-form-input" name="user_password[]" placeholder="Min. 8 caracteres">
        </div>
        <div class="cl-form-group" style="flex:1;min-width:100px">
          <label class="cl-form-label">Rol</label>
          <select class="cl-form-input" name="user_rol[]">
            <option value="mesero">Mesero</option>
            {% for est in estaciones %}
            <option value="cocina:{{ est.nombre }}">Cocina — {{ est.nombre }}</option>
            {% endfor %}
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
    </div>

    <button type="button" class="cl-btn cl-btn--outline" id="addUserBtn"
            style="width:100%;margin-top:var(--cl-space-2)">
      + Agregar otra persona
    </button>

    <div class="cl-setup__actions" style="margin-top:var(--cl-space-5)">
      <a href="{{ url_for('setup.paso4') }}" class="cl-btn cl-btn--outline"><i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Atrás</a>
      <button type="submit" class="cl-btn cl-btn--primary">
        Finalizar <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
      </button>
    </div>

    <div style="text-align:center;margin-top:var(--cl-space-3)">
      <button type="button" id="skipBtn" style="background:none;border:none;cursor:pointer;font-size:var(--cl-text-sm);color:var(--cl-text-secondary);text-decoration:underline">
        Omitir este paso
      </button>
    </div>
  </form>

  <form method="POST" action="{{ url_for('setup.completar') }}" id="skipForm" style="display:none">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  </form>
{% endblock %}

{% block scripts %}
{{ super() }}
<script nonce="{{ csp_nonce }}">
(function(){
  // Add user row
  document.getElementById('addUserBtn').addEventListener('click', function(){
    var container = document.getElementById('userRows');
    var template = container.querySelector('.cl-setup__row');
    var row = template.cloneNode(true);
    // Clear all inputs in the cloned row
    row.querySelectorAll('input').forEach(function(el){ el.value = ''; });
    row.querySelectorAll('select').forEach(function(el){ el.selectedIndex = 0; });
    // Add remove button
    var removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'btn-remove';
    removeBtn.innerHTML = '<i data-lucide="x" style="width:14px;height:14px;"></i>';
    removeBtn.title = 'Eliminar';
    removeBtn.addEventListener('click', function(){ row.remove(); });
    row.appendChild(removeBtn);
    container.appendChild(row);
    if (window.lucide) lucide.createIcons();
  });

  // Skip step — submit hidden form
  document.getElementById('skipBtn').addEventListener('click', function(){
    document.getElementById('skipForm').submit();
  });
})();
</script>
{% endblock %}
