# ═══════════════════════════════════════════════════
# KaiRest POS — Entrega Continua (CD)
# Runs on: push of a version tag (v*.*.*)
# Builds & publishes a production Docker image to GHCR
# ═══════════════════════════════════════════════════
name: CD — Release Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Step 1: Run tests before building ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: 🧪 Run tests
        env:
          DATABASE_URL: 'sqlite://'
          FLASK_ENV: development
          REDIS_URL: ''
          TESTING: '1'
          SECRET_KEY: ci-test-key
        run: python -m pytest tests/ -v --tb=short

  # ── Step 2: Build & Push Docker image ──
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Release Summary
        run: |
          echo "🍽 KaiRest ${{ github.ref_name }} published!"
          echo "Pull: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
